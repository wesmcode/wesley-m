<html lang="en">
<head>

    <meta property="og:title" content="Wesley Melo — Product Manager">

    <link rel="icon" href="data:,">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",

            "name": "Wesley Melo",

    <style>

    /* Reset */
    html, body, div, span, h1, p, pre, a, code, em, img, strong, sub, sup,
    ol, ul, li, button, fieldset, form, label, header, main, nav, section {
        margin: 0;
        padding: 0;
        border: 0;
        font-size: 100%;
        font: inherit;
        vertical-align: baseline;
    }
    header, main, nav, section { display: block; }
    ol, ul { list-style: none; }
    *, *::before, *::after { box-sizing: border-box; }

    :root {
        --bg: #2B3856;
        --fg: #FFFFFF;
        --fg-hover: rgba(255, 255, 255, 0.5);
    }

    html, body {
        min-height: 100vh;
        height: 100%;
        font-size: 16px;
        line-height: 24px;
        font-family: 'Garamond', 'EB Garamond', 'Times New Roman', serif;
        background: var(--bg);
        color: var(--fg);
        -webkit-font-smoothing: antialiased;
    }

    /* Skip link — visible only on keyboard focus */
    .skip-link {
        position: absolute;
        left: -9999px;
        top: 0;
        padding: 8px 16px;
        background: var(--fg);
        color: var(--bg);
        text-decoration: none;
    }
    .skip-link:focus {
        left: 0;
    }

    /* Layout */
    .outer {
        width: 100%;
        min-height: 100vh;
        display: grid;
        align-items: center;
        justify-content: center;
    }

    .inner {
        position: relative;
        padding: 40px;
    }

    .row {
        height: 24px;
        text-transform: uppercase;
        user-select: none;
    }

    .row-empty {
        height: 24px;
    }

    .row p,
    .row h1 {
        display: inline-block;
        padding-left: 3px;
        cursor: default;
    }

    /* Timeline — each row is its own grid so hover is scoped */
    .timeline-row {
        display: grid;
        grid-template-columns: 180px auto;
        height: 24px;
        text-transform: uppercase;
        user-select: none;
    }

    .timeline-row .company,
    .timeline-row .years {
        line-height: 24px;
        padding-left: 3px;
        cursor: default;
    }

    /* All clickable elements — one set of rules */
    .link {
        font-weight: 400;
        color: var(--fg);
        text-decoration: none;
        text-transform: uppercase;
        background: none;
        border: none;
        border-radius: 0;
        padding: 0;
        margin: 0;
        font-family: inherit;
        font-size: inherit;
        line-height: inherit;
        cursor: default;
    }

    .link:hover {
        color: var(--fg-hover);
        text-decoration: underline;
    }

    .link:focus-visible {
        color: var(--bg);
        background: var(--fg);
        outline: none;
    }

    .link:focus:not(:focus-visible) {
        color: var(--fg);
        background: none;
        outline: none;
    }

    .link:active {
        background: var(--fg);
        color: var(--bg);
    }

    /* Mobile */
    .mobile-only { display: none; }

    @media only screen and (max-width: 768px) {

        html, body {
            font-size: 14px;
            line-height: 28px;
        }

        .outer {
            display: block;
            padding: 32px 24px;
            padding-left: 21px;
            min-height: auto;
        }

        .inner {
            padding: 0;
        }

        .row {
            height: 28px;
        }

        .row-empty {
            height: 28px;
        }

        .timeline-row {
            grid-template-columns: 1fr auto;
            height: 28px;
            column-gap: 16px;
        }

        .timeline-row .company,
        .timeline-row .years {
            line-height: 28px;
            font-size: 14px;
        }

        .nav-item {
            font-size: 14px;
            line-height: 28px;
            width: 100%;
            display: flex;
        }

        .button-label {
            flex-grow: 1;
            text-align: left;
        }

        .mobile-only {
            display: inline;
            flex-shrink: 0;
        }

        .link:hover {
            text-decoration: none;
        }
    }

    </style>
</head>
<body>

    <a href="#main-content" class="skip-link">Skip to content</a>

    <main id="main-content" class="outer">
        <div class="inner">

            <header>
                <div class="row"><h1><span>Wesley</span> <span>Melo</span></h1></div>
                <div class="row"><p>Product Manager</p></div>
            </header>
            <div class="row-empty"></div>

            <section aria-label="Work history">
                <div class="timeline-row">
                    <a href="https://www.codeandtheory.com" target="_blank" rel="noopener noreferrer" class="link company">Code and Theory</a>
                    <span class="years">2025 &rarr;&#xFE0E; &middot;&middot;&middot;&middot;</span>
                </div>
                <div class="timeline-row">
                    <a href="https://www.liferay.com" target="_blank" rel="noopener noreferrer" class="link company">Liferay</a>
                    <span class="years">2023 &rarr;&#xFE0E; 2025</span>
                </div>
                <div class="timeline-row">
                    <a href="https://www.thoughtworks.com" target="_blank" rel="noopener noreferrer" class="link company">ThoughtWorks</a>
                    <span class="years">2019 &rarr;&#xFE0E; 2023</span>
                </div>
                <div class="timeline-row">
                    <a href="https://www.accenture.com/" target="_blank" rel="noopener noreferrer" class="link company">Accenture</a>
                    <span class="years">2014 &rarr;&#xFE0E; 2019</span>
                </div>
            </section>

            <div class="row-empty"></div>

            <nav aria-label="Contact and links">
                <div class="row">
                    <a href="services.html" class="link nav-item">
                        <span class="button-label">Services</span>
                        <span class="mobile-only">[&rarr;&#xFE0E;]</span>
                    </a>
                </div>
                <div class="row">
                    <a href="resume.html" target="_blank" class="link nav-item">
                        <span class="button-label">Resume</span>
                        <span class="mobile-only">[↗&#xFE0E;]</span>
                    </a>
                </div>
                <div class="row">
                    <a id="email-link" href="#" class="link nav-item">
                        <span class="button-label">Email</span>
                        <span class="mobile-only">[+]</span>
                    </a>
                </div>

                <div class="row-empty"></div>

                <div class="row">
                    <a href="https://linkedin.com/in/wesmelo" target="_blank" rel="noopener noreferrer" class="link nav-item">
                        <span class="button-label">LinkedIn</span>
                        <span class="mobile-only">[↗&#xFE0E;]</span>
                    </a>
                </div>
            </nav>

        </div>
    </main>

    <script>
    'use strict';
    var addr = ['contato', 'wesley-m.com'].join('@');
    var emailLink = document.getElementById('email-link');
    emailLink.href = 'mailto:' + addr;
    emailLink.addEventListener('click', function() {
        emailLink.querySelector('.button-label').textContent = addr;
    });
    </script>

</body>
</html>
