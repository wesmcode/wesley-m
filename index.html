<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wesley Melo — Product Manager</title>
    <meta name="description" content="Wesley Melo — Product Manager with 6+ years in agile development, product management and consulting.">
    <meta name="author" content="Wesley Melo">
    <link rel="icon" href="data:,">
    <style>

    /* Reset */
    html, body, div, span, h1, p, pre, a, code, em, img, strong, sub, sup,
    ol, ul, li, button, fieldset, form, label, header, main, nav, section {
        margin: 0;
        padding: 0;
        border: 0;
        font-size: 100%;
        font: inherit;
        vertical-align: baseline;
    }
    header, main, nav, section { display: block; }
    ol, ul { list-style: none; }
    *, *::before, *::after { box-sizing: border-box; }

    :root {
        --bg: #2B3856;
        --fg: #FFFFFF;
        --fg-hover: rgba(255, 255, 255, 0.5);
    }

    html, body {
        min-height: 100vh;
        height: 100%;
        font-size: 16px;
        line-height: 24px;
        font-family: 'Garamond', 'EB Garamond', 'Times New Roman', serif;
        background: var(--bg);
        color: var(--fg);
        -webkit-font-smoothing: antialiased;
    }

    /* Skip link — visible only on keyboard focus */
    .skip-link {
        position: absolute;
        left: -9999px;
        top: 0;
        padding: 8px 16px;
        background: var(--fg);
        color: var(--bg);
        text-decoration: none;
    }
    .skip-link:focus {
        left: 0;
    }

    /* Layout */
    .outer {
        width: 100%;
        min-height: 100vh;
        display: grid;
        align-items: center;
        justify-content: center;
    }

    .inner {
        position: relative;
        padding: 40px;
    }

    .row {
        height: 24px;
        text-transform: uppercase;
        user-select: none;
    }

    .row-empty {
        height: 24px;
    }

    .row p,
    .row h1 {
        display: inline-block;
        padding-left: 3px;
        cursor: default;
    }

    /* Timeline — each row is its own grid so hover is scoped */
    .timeline-row {
        display: grid;
        grid-template-columns: 180px auto;
        height: 24px;
        text-transform: uppercase;
        user-select: none;
    }

    .timeline-row:hover {
        color: var(--fg-hover);
    }

    .timeline-row:hover .company {
        color: var(--fg-hover);
    }

    .timeline-row .company,
    .timeline-row .years {
        line-height: 24px;
        padding-left: 3px;
        cursor: default;
    }

    .timeline-row .company {
        font-weight: 400;
        color: var(--fg);
        text-decoration: none;
    }

    /* Buttons */
    button {
        border: none;
        padding: 0;
        margin: 0;
        background: none;
        font-family: inherit;
        font-size: 16px;
        line-height: 24px;
        text-transform: uppercase;
        padding-left: 3px;
        border-radius: 2px;
        color: var(--fg);
        cursor: default;
        text-decoration: none;
    }

    button:focus-visible {
        color: var(--bg);
        background: var(--fg);
        outline: none;
    }

    button:active {
        background: var(--fg);
        color: var(--bg);
    }

    /* Hover — simple underline */
    .content-link:hover,
    .content-link:focus-visible,
    .content-copy:hover,
    .content-copy:focus-visible {
        color: var(--fg-hover);
        text-decoration: underline;
    }

    /* Screen-reader only */
    .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
    }

    /* Mobile */
    .mobile-only { display: none; }

    @media only screen and (max-width: 768px) {

        html, body {
            font-size: 14px;
            line-height: 28px;
        }

        .outer {
            display: block;
            padding: 32px 24px;
            padding-left: 21px;
            min-height: auto;
        }

        .inner {
            padding: 0;
        }

        .row {
            height: 28px;
        }

        .row-empty {
            height: 28px;
        }

        .timeline-row {
            grid-template-columns: 1fr auto;
            height: 28px;
            column-gap: 16px;
        }

        .timeline-row .company,
        .timeline-row .years {
            line-height: 28px;
            font-size: 14px;
        }

        button {
            font-size: 14px;
            line-height: 28px;
            width: 100%;
            display: flex;
        }

        .button-label {
            flex-grow: 1;
            text-align: left;
        }

        .mobile-only {
            display: inline;
            flex-shrink: 0;
        }

        .content-link:hover,
        .content-link:focus-visible,
        .content-copy:hover,
        .content-copy:focus-visible {
            text-decoration: none;
        }
    }

    </style>
</head>
<body>

    <a href="#main-content" class="skip-link">Skip to content</a>

    <main id="main-content" class="outer">
        <div class="inner">

            <header>
                <div class="row"><h1><span>Wesley</span> <span>Melo</span></h1></div>
                <div class="row"><p>Product Manager</p></div>
            </header>
            <div class="row-empty"></div>

            <section aria-label="Work history">
                <div class="timeline-row">
                    <a href="https://www.codeandtheory.com" target="_blank" rel="noopener noreferrer" class="company">Code and Theory</a>
                    <span class="years">2025 &rarr; &middot;&middot;&middot;&middot;</span>
                </div>
                <div class="timeline-row">
                    <a href="https://www.liferay.com" target="_blank" rel="noopener noreferrer" class="company">Liferay</a>
                    <span class="years">2023 &rarr; 2025</span>
                </div>
                <div class="timeline-row">
                    <a href="https://www.thoughtworks.com" target="_blank" rel="noopener noreferrer" class="company">ThoughtWorks</a>
                    <span class="years">2019 &rarr; 2023</span>
                </div>
                <div class="timeline-row">
                    <a href="https://www.accenture.com/" target="_blank" rel="noopener noreferrer" class="company">Accenture</a>
                    <span class="years">2014 &rarr; 2019</span>
                </div>
            </section>

            <div class="row-empty"></div>

            <nav aria-label="Contact and links">
                <div class="row">
                    <button class="content-link" data-href="resume.html" tabindex="0">
                        <span class="button-label">Resume</span>
                        <span class="mobile-only">[↗]</span>
                    </button>
                </div>
                <div class="row">
                    <button id="email-copy" class="content-copy" data-email="sync.wesm@gmail.com" tabindex="0">
                        <span class="button-label">Email</span>
                        <span class="mobile-only">[+]</span>
                    </button>
                </div>

                <div class="row-empty"></div>

                <div class="row">
                    <button class="content-link" data-href="https://linkedin.com/in/wesmelo" tabindex="0">
                        <span class="button-label">LinkedIn</span>
                        <span class="mobile-only">[↗]</span>
                    </button>
                </div>
            </nav>

        </div>
    </main>

    <span id="copy-status" class="sr-only" aria-live="polite"></span>

    <script>
    'use strict';

    /* Must match the CSS media query breakpoint */
    var MOBILE_BREAKPOINT = 768;

    document.querySelectorAll('.content-link').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var href = btn.getAttribute('data-href');
            if (href) window.open(href, '_blank', 'noopener');
        });
    });

    var emailBtn = document.getElementById('email-copy');
    var copyStatus = document.getElementById('copy-status');
    var email = emailBtn.getAttribute('data-email');

    emailBtn.addEventListener('click', function() {
        if (window.innerWidth <= MOBILE_BREAKPOINT) {
            window.location.href = 'mailto:' + email;
            return;
        }
        navigator.clipboard.writeText(email).then(function() {
            var label = emailBtn.querySelector('.button-label');
            label.textContent = 'COPIED';
            copyStatus.textContent = 'Email copied to clipboard';
            setTimeout(function() {
                label.textContent = 'Email';
                copyStatus.textContent = '';
            }, 2000);
        }).catch(function() {
            window.location.href = 'mailto:' + email;
        });
    });

    </script>

</body>
</html>
